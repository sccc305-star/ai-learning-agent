<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🤖 AI Learning Agent</h1>
        <p class="subtitle">Learn anything with AI-powered step-by-step guidance!</p>

        <div class="input-box">
            <input type="text" id="topicInput" placeholder="Enter any topic... e.g. Python, AI, Math">
            <button onclick="learnTopic()">🚀 Learn Now!</button>
        </div>

        <!-- Level Select -->
        <div class="level-box">
            <span>Level:</span>
            <button class="level-btn active" onclick="setLevel('Basic', this)">🟢 Basic</button>
            <button class="level-btn" onclick="setLevel('Medium', this)">🟡 Medium</button>
            <button class="level-btn" onclick="setLevel('Deep', this)">🔴 Deep</button>
        </div>

        <div class="suggestions">
            <span onclick="setTopic('Python Programming')">Python</span>
            <span onclick="setTopic('Machine Learning')">Machine Learning</span>
            <span onclick="setTopic('Web Development')">Web Dev</span>
            <span onclick="setTopic('Data Science')">Data Science</span>
            <span onclick="setTopic('Artificial Intelligence')">AI</span>
        </div>

        <div id="loading" class="loading" style="display:none;">
            🤔 AI is thinking...
        </div>

        <div id="resultContainer" style="display:none;">
            <div class="result-header">
                <span>📖 Result</span>
                <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
                <button class="quiz-btn" onclick="generateQuiz()">📝 Take Quiz</button>
            </div>
            <div id="result" class="result-box"></div>

            <!-- Follow-up Questions -->
            <div class="followup-box">
                <p>🔍 Related Topics:</p>
                <div id="followupQuestions"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
